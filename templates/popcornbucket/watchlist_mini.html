{% load static %}
<div class="profile-box mb-4">
        <div class="d-flex justify-content-between mb-3">
            <h4 class="mb-0">Watchlist</h4>
            <a href="{% url 'watchlist' %}" class="small text-dark">show all</a>
        </div>

        {% if films %}
            <div class="d-flex gap-4 flex-wrap">
                {% for film in films|slice:":5" %}
                    <div class="watch-item">
                        {% if film.poster %}
                            <img src="{{ film.poster.url }}" class="watch-img" alt="">
                        {% else %}
                            <img src="{% static 'images/NoPosterAvailable.jpg' %}" class="watch-img" alt="">
                        {% endif %}
                        
                        <h6>
                            <a href="{% url 'film_detail' film.id %}" 
                            style="color:black;text-decoration:none;">
                            {{ film.title }}
                            </a>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <p class="text-muted">No films in this watchlist yet.</p>
        {% endif %}
    </div>
