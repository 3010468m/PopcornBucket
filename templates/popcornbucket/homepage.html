{% extends "popcornbucket/base.html" %}

{% block content %}
<h2>Welcome to Popcorn Bucket</h2>

{% if user.is_authenticated %}
    <p>Hello, {{ user.username }}!</p>
    <p><a href="{% url 'logout' %}">Logout</a></p>
{% else %}
    <p>You are not logged in.</p>
    <p><a href="{% url 'login' %}">Login</a></p>
{% endif %}

{% endblock %}
