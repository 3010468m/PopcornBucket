{% extends "popcornbucket/base.html" %}
{% load static %}

{% block content %}
<div class="container py-4 edit-profile-container">

    <div class="profile-box">

        <h2 class="mb-4">Edit Profile</h2>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- PROFILE IMAGE PREVIEW -->
            <div class="text-center mb-4">
                {% if form.instance.profile_picture %}
                    <img src="{{ form.instance.profile_picture.url }}" class="edit-img mb-3">
                {% else %}
                    <img src="{% static 'images/no_pfp.jpg' %}" class="edit-img mb-3">
                {% endif %}

                <label class="form-label fw-semibold">Change Profile Picture</label>
                <input type="file" name="profile_picture" class="form-control">
            </div>

            <!-- DATE OF BIRTH -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Date of Birth</label>
                {{ form.date_of_birth }}
            </div>

            <!-- BUTTONS -->
            <div class="d-flex justify-content-between mt-4">
                <a href="{% url 'user_profile' request.user.pk %}" class="btn btn-outline-secondary">
                    Cancel
                </a>
                <button type="submit" class="btn btn-primary">
                    Save Changes
                </button>
            </div>

        </form>

    </div>

</div>
{% endblock %}
